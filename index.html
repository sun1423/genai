<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Analysis Tool</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        textarea { width: 100%; height: 150px; margin-bottom: 15px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
        #output { background: #f8f9fa; padding: 15px; margin-top: 20px; border-radius: 4px; border-left: 4px solid #007bff; white-space: pre-wrap; min-height: 40px; }
    </style>
</head>
<body>
    <h3>AI Text Analysis</h3>
    <textarea id="msg" placeholder="Paste your text or logs here..."></textarea>
    <button id="runBtn" onclick="send()">Analyze Text</button>
    <div id="output">Waiting for input...</div>

    <script>
        async function send() {
            const out = document.getElementById('output');
            const btn = document.getElementById('runBtn');
            
            out.innerText = "Processing...";
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: document.getElementById('msg').value
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "Request failed");
                out.innerText = data.choices[0].message.content;
            } catch (err) {
                out.innerText = "Error: " + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
