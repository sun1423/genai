<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Processor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; line-height: 1.6; color: #333; }
        .container { border: 1px solid #e0e0e0; border-radius: 12px; padding: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); background: white; }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        textarea { width: 100%; height: 180px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; resize: vertical; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #a0c4ff; cursor: not-allowed; }
        #output { margin-top: 25px; padding: 20px; background-color: #f9f9f9; border-left: 5px solid #007bff; border-radius: 4px; white-space: pre-wrap; font-size: 15px; min-height: 50px; color: #2c3e50; }
        .error { color: #d9534f; border-left-color: #d9534f; }
    </style>
</head>
<body>
    <div class="container">
        <h2>AI Analysis</h2>
        <textarea id="msg" placeholder="Paste your text or logs here..."></textarea>
        <button id="runBtn" onclick="send()">Run Analysis</button>
        <div id="output">Result will appear here...</div>
    </div>

    <script>
        async function send() {
            const out = document.getElementById('output');
            const btn = document.getElementById('runBtn');
            const text = document.getElementById('msg').value;

            if (!text) return alert("Please enter some text first.");

            out.innerText = "Analyzing... please wait.";
            out.classList.remove('error');
            btn.disabled = true;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Failed to connect to server");
                }

                // Show only the clean result string
                out.innerText = data.result;
            } catch (err) {
                out.innerText = "Error: " + err.message;
                out.classList.add('error');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
