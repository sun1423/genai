<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI DevOps Agent</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap');
:root{--bg:#f4f6fa;--bg2:#fff;--bg3:#eef1f7;--border:#dde3ef;--border2:#c8d2e8;--blue:#1a73e8;--green:#1e8e3e;--yellow:#f29900;--red:#d93025;--purple:#7c4dff;--text:#1a2332;--text2:#6b7a8d;--text3:#3d5068;--sh:0 2px 12px rgba(26,35,50,.08);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* Login */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:36px;width:380px;box-shadow:0 8px 32px rgba(26,35,50,.12);}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.login-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.login-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;}
.login-title span{color:var(--blue);}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:5px;}
.lf input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:10px 12px;border-radius:7px;outline:none;}
.login-btn{width:100%;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;color:#fff;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;padding:12px;border-radius:7px;cursor:pointer;margin-top:8px;}
.login-err{font-size:11px;color:var(--red);margin-top:8px;display:none;padding:8px;background:rgba(217,48,37,0.05);border-radius:4px;}

/* App Layout */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.status-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);background:var(--bg3);padding:4px 10px;border-radius:20px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--red);}
.dot.on{background:var(--green);box-shadow:0 0 5px var(--green);}
.dot.checking{background:var(--yellow);animation:pulse 1s infinite;}
@keyframes pulse{0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}

.layout{display:flex;flex:1;overflow:hidden;}
.lpanel{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.psec{padding:15px;border-bottom:1px solid var(--border);}
.plbl{font-size:9px;letter-spacing:1px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;}
.pi-item{padding:8px;font-size:11px;cursor:pointer;border-radius:6px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi-item:hover{background:var(--bg3);color:var(--blue);}

.mchat{flex:1;display:flex;flex-direction:column;background:#fff;}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:15px;}

/* Messages */
.msg{display:flex;flex-direction:column;max-width:85%;margin-bottom:10px;}
.msg.user{align-self:flex-end;}
.msg.agent{align-self:flex-start;}
.bbl{padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.5;}
.msg.user .bbl{background:var(--blue);color:#fff;border-bottom-right-radius:2px;}
.msg.agent .bbl{background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:2px;}

/* Execution Button */
.exe-btn{margin-top:10px;background:var(--green);color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:700;font-family:inherit;font-size:12px;}
pre{background:#1a2332;color:#eee;padding:12px;border-radius:8px;margin:10px 0;font-size:12px;overflow-x:auto;}

/* Input Area */
.inp-area{padding:20px;background:var(--bg2);border-top:1px solid var(--border);}
.inp-wrap{display:flex;gap:12px;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:8px 12px;align-items:flex-end;}
#ui{flex:1;background:transparent;border:none;outline:none;font-family:inherit;font-size:14px;padding:8px 0;resize:none;max-height:180px;}
.snd-btn{background:var(--blue);color:white;border:none;width:36px;height:36px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.ovl{position:fixed;inset:0;background:rgba(26,35,50,0.6);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.ovl.open{display:flex;}
.modal{background:var(--bg2);border-radius:16px;padding:24px;width:400px;}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo"><div class="login-icon" style="color:white">&#x1F916;</div><div class="login-title">AI <span>DevOps</span></div></div>
    <div class="lf"><label>Username</label><input type="text" id="loginUser" value="admin"></div>
    <div class="lf"><label>Password</label><input type="password" id="loginPass" value="admin"></div>
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" onclick="doLogin()">Sign In &rarr;</button>
    <div style="margin-top:15px; text-align:center; font-size:11px;">
      <span onclick="openModal()" style="color:var(--blue); cursor:pointer; text-decoration:underline;">&#9881; Set Backend URL</span>
    </div>
  </div>
</div>

<div id="mainApp" style="display:none;flex-direction:column;height:100vh;">
  <div class="hdr">
    <div style="font-family:'Syne';font-weight:800;display:flex;align-items:center;gap:8px;">
        <div style="width:24px;height:24px;background:var(--blue);border-radius:5px;"></div> AI DevOps
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <div class="status-pill"><div class="dot" id="dot"></div><span id="stxt">Offline</span></div>
      <button onclick="openModal()" style="cursor:pointer; background:none; border:none; font-size:18px;">&#x2699;</button>
      <button onclick="doLogout()" style="cursor:pointer; color:var(--red); background:none; border:none; font-weight:700; font-size:11px;">LOGOUT</button>
    </div>
  </div>
  <div class="layout">
    <div class="lpanel">
        <div class="psec">
            <div class="plbl">Quick Tasks</div>
            <div class="pi-item" onclick="fire('Check Docker status')">Docker Status</div>
            <div class="pi-item" onclick="fire('Show system resources')">System Health</div>
        </div>
        <div style="padding:15px; flex:1; overflow-y:auto;">
            <div class="plbl">History</div>
            <div id="histList"></div>
        </div>
    </div>
    <div class="mchat">
        <div class="msgs" id="msgs">
            <div id="welcome" style="padding:60px 20px; text-align:center;">
                <h2 style="font-family:'Syne';margin-bottom:10px;">System Ready.</h2>
                <p style="color:var(--text2); font-size:12px;">Waiting for command...</p>
            </div>
        </div>
        <div class="inp-area">
            <div class="inp-wrap">
                <textarea id="ui" placeholder="Type a command..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
                <button class="snd-btn" onclick="sendMsg()">&#x27A4;</button>
            </div>
        </div>
    </div>
  </div>
</div>

<div class="ovl" id="ovl">
  <div class="modal">
    <h3>Configuration</h3>
    <div class="lf" style="margin-top:15px;"><label>Backend URL</label><input type="text" id="backendUrl"></div>
    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
      <button onclick="closeModal()">Cancel</button>
      <button onclick="saveUrl()" style="background:var(--blue); color:white; border:none; padding:8px 20px; border-radius:6px;">Save</button>
    </div>
  </div>
</div>

<script>
var BACKEND = localStorage.getItem('agent_backend') || '';
var AUTH_TOKEN = localStorage.getItem('agent_token') || '';
var HDR = { 'ngrok-skip-browser-warning': 'true' };
var pendingPlan = null;

function init() {
    document.getElementById('backendUrl').value = BACKEND;
    if (AUTH_TOKEN) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        if (BACKEND) checkHealth();
    } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
    }
    renderHist();
}

function checkHealth() {
    const dot = document.getElementById('dot');
    const txt = document.getElementById('stxt');
    dot.className = 'dot checking';
    fetch(BACKEND + '/health', { headers: HDR })
        .then(r => r.json()).then(() => { dot.className = 'dot on'; txt.textContent = 'Online'; })
        .catch(() => { dot.className = 'dot'; txt.textContent = 'Offline'; });
}

function sendMsg() {
    const inp = document.getElementById('ui');
    const txt = inp.value.trim();
    if (!txt || !BACKEND) return;

    document.getElementById('welcome').style.display = 'none';
    addMsg('user', txt);
    saveHist(txt);
    inp.value = ''; inp.style.height = 'auto';

    const loadingId = addMsg('agent', 'Analyzing request...');

    // ACTUAL FETCH TO BACKEND /plan
    fetch(BACKEND + '/plan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + AUTH_TOKEN, ...HDR },
        body: JSON.stringify({ prompt: txt })
    })
    .then(r => r.json())
    .then(data => {
        updateMsg(loadingId, data.plan || data.message || "Plan generated.");
        if (data.plan) {
            pendingPlan = data.plan;
            showExecButton(loadingId);
        }
    })
    .catch(err => updateMsg(loadingId, "Error: Could not connect to backend."));
}

function executePlan(msgId) {
    updateMsg(msgId, "Executing plan...");
    fetch(BACKEND + '/execute', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + AUTH_TOKEN, ...HDR },
        body: JSON.stringify({ plan: pendingPlan })
    })
    .then(r => r.json())
    .then(data => {
        updateMsg(msgId, "Execution Complete:\n```\n" + (data.output || data.result || "Success") + "\n```");
    })
    .catch(err => updateMsg(msgId, "Execution failed."));
}

function addMsg(role, text) {
    const id = 'm-' + Date.now();
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.id = id;
    div.innerHTML = `<div class="bbl">${fmt(text)}</div>`;
    document.getElementById('msgs').appendChild(div);
    const m = document.getElementById('msgs'); m.scrollTop = m.scrollHeight;
    return id;
}

function updateMsg(id, text) {
    const el = document.querySelector('#' + id + ' .bbl');
    if (el) el.innerHTML = fmt(text);
}

function showExecButton(id) {
    const el = document.getElementById(id);
    const btn = document.createElement('button');
    btn.className = 'exe-btn';
    btn.innerText = 'Run Plan Now';
    btn.onclick = () => executePlan(id);
    el.appendChild(btn);
}

function fmt(t) {
    t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    t = t.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
    t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    return t.replace(/\n/g, '<br>');
}

function doLogin() {
    const u = document.getElementById('loginUser').value;
    const p = document.getElementById('loginPass').value;
    if (u === 'admin' && p === 'admin') {
        AUTH_TOKEN = 'local-dev';
        localStorage.setItem('agent_token', AUTH_TOKEN);
        init();
    } else {
        alert("Using default admin/admin for this build.");
    }
}

function fire(c) { document.getElementById('ui').value = c; document.getElementById('ui').focus(); }
function saveHist(t) {
    let h = JSON.parse(localStorage.getItem('agent_hist')||'[]');
    h.unshift({txt:t}); localStorage.setItem('agent_hist', JSON.stringify(h.slice(0,10)));
    renderHist();
}
function renderHist() {
    const h = JSON.parse(localStorage.getItem('agent_hist')||'[]');
    document.getElementById('histList').innerHTML = h.map(i => `<div class="pi-item" onclick="fire('${i.txt}')">${i.txt}</div>`).join('');
}
function saveUrl() { 
    BACKEND = document.getElementById('backendUrl').value.trim(); 
    localStorage.setItem('agent_backend', BACKEND); 
    closeModal(); init(); 
}
function openModal() { document.getElementById('ovl').classList.add('open'); }
function closeModal() { document.getElementById('ovl').classList.remove('open'); }
function doLogout() { localStorage.removeItem('agent_token'); location.reload(); }

window.onload = init;
</script>
</body>
</html>
