<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI DevOps Agent</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap');
:root{--bg:#f4f6fa;--bg2:#fff;--bg3:#eef1f7;--border:#dde3ef;--border2:#c8d2e8;--blue:#1a73e8;--green:#1e8e3e;--yellow:#f29900;--red:#d93025;--purple:#7c4dff;--text:#1a2332;--text2:#6b7a8d;--text3:#3d5068;--sh:0 2px 12px rgba(26,35,50,.08);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* Login */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:36px;width:380px;box-shadow:0 8px 32px rgba(26,35,50,.12);}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.login-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.login-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;}
.login-title span{color:var(--blue);}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:5px;}
.lf input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:10px 12px;border-radius:7px;outline:none;transition:all .2s;}
.lf input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,115,232,.1);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;color:#fff;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;padding:12px;border-radius:7px;cursor:pointer;margin-top:8px;transition:opacity .2s;}
.login-btn:hover{opacity:.9;}
.login-err{font-size:11px;color:var(--red);margin-top:8px;display:none;}
.login-err.show{display:block;}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);box-shadow:var(--sh);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.5px;}
.logo-name em{font-style:normal;color:var(--blue);}
.logo-tag{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);}
.hdr-r{display:flex;align-items:center;gap:8px;}
.status-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:20px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 2s infinite;}
.dot.on{background:var(--green);}
.dot.checking{background:var(--yellow);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.llm-badge{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:700;letter-spacing:.5px;}
.llm-groq{background:rgba(124,77,255,.1);color:var(--purple);border:1px solid rgba(124,77,255,.2);}
.llm-openrouter{background:rgba(26,115,232,.1);color:var(--blue);border:1px solid rgba(26,115,232,.2);}
.icon-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text3);font-size:13px;width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{border-color:var(--blue);color:var(--blue);}

/* Layout */
.layout{display:flex;flex:1;overflow:hidden;}

/* Sidebar */
.lpanel{width:228px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.psec{padding:12px 13px;border-bottom:1px solid var(--border);}
.plbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;}
.plist{display:flex;flex-direction:column;gap:2px;}
.pi-item{display:flex;align-items:flex-start;gap:7px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:11px;color:var(--text3);border:1px solid transparent;transition:all .15s;line-height:1.4;}
.pi-item:hover{background:var(--bg3);border-color:var(--border);color:var(--text);}
.pio{font-size:13px;flex-shrink:0;}
.chat-hist{flex:1;overflow-y:auto;padding:12px 13px;}
.chi{padding:8px 9px;border-radius:6px;margin-bottom:3px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;}
.chi:hover{border-color:var(--border2);}
.chi-txt{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chi-time{font-size:10px;color:var(--text2);margin-top:2px;}

/* Chat */
.mchat{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{width:4px;}
.msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* Welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;text-align:center;padding:32px;}
.wico{width:68px;height:68px;border-radius:18px;background:linear-gradient(135deg,rgba(26,115,232,.1),rgba(124,77,255,.1));border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:30px;}
.welcome h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.welcome h2 span{color:var(--blue);}
.welcome p{font-size:12px;color:var(--text2);max-width:480px;line-height:1.8;}
.caps{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:500px;}
.cap{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:11px;color:var(--text3);}
.qa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;max-width:520px;width:100%;}
.qa{background:var(--bg2);border:1px solid var(--border);color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px;border-radius:8px;cursor:pointer;text-align:left;transition:all .2s;display:flex;flex-direction:column;gap:2px;}
.qa:hover{border-color:var(--blue);background:rgba(26,115,232,.03);transform:translateY(-1px);}
.qi{font-size:14px;}
.qt{font-weight:700;color:var(--text);font-size:11px;}
.qs{color:var(--text2);font-size:10px;}

/* Messages */
.msg{display:flex;gap:10px;max-width:100%;animation:fadeUp .3s ease;}
.msg.user{flex-direction:row-reverse;align-self:flex-end;max-width:70%;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.av{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.msg.user .av{background:linear-gradient(135deg,#5f6368,#3c4043);}
.msg.agent .av{background:linear-gradient(135deg,var(--blue),var(--purple));}
.mb{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1;}
.msg.user .mb{align-items:flex-end;}
.mm{font-size:10px;color:var(--text2);display:flex;gap:7px;align-items:center;}
.msg.user .mm{flex-direction:row-reverse;}
.mn{font-weight:700;}
.msg.agent .mn{color:var(--blue);}
.msg.user .mn{color:var(--text3);}
.bbl{padding:11px 14px;border-radius:10px;font-size:13px;line-height:1.75;max-width:100%;}
.msg.user .bbl{background:rgba(26,115,232,.08);border:1px solid rgba(26,115,232,.2);border-top-right-radius:2px;}
.msg.agent .bbl{background:var(--bg2);border:1px solid var(--border);border-top-left-radius:2px;box-shadow:var(--sh);width:100%;}
.bbl pre{background:#1e2433;border:1px solid #2d3748;border-radius:6px;padding:10px;margin:8px 0;overflow-x:auto;font-size:11px;line-height:1.6;color:#e2e8f0;position:relative;}
.pre-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #2d3748;}
.pre-lang{font-size:10px;color:#7c8db0;letter-spacing:1px;text-transform:uppercase;}
.cpbtn{background:#2d3748;border:1px solid #3d4f6b;color:#7c8db0;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;cursor:pointer;}
.cpbtn:hover{color:#60a5fa;}
.bbl pre code{color:#a8d8a8;}
.bbl code{font-family:'JetBrains Mono',monospace;background:rgba(26,115,232,.08);color:var(--blue);padding:1px 5px;border-radius:3px;font-size:11px;}
.bbl h3{font-family:'Syne',sans-serif;font-size:14px;color:var(--blue);margin:10px 0 5px;}
.bbl strong{color:#b06a00;}
.bbl a{color:var(--blue);}
.bbl ul{padding-left:18px;margin:5px 0;}
.bbl li{margin:3px 0;}

/* Plan review card */
.plan-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;margin:10px 0;}
.plan-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.plan-badge{font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(242,153,0,.12);color:var(--yellow);border:1px solid rgba(242,153,0,.25);font-weight:700;letter-spacing:.5px;}
.plan-title{font-size:13px;font-weight:700;color:var(--text);}
.plan-body{font-size:12px;color:var(--text3);line-height:1.7;margin-bottom:12px;white-space:pre-wrap;}
.plan-edit{width:100%;background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:9px 11px;border-radius:6px;outline:none;resize:vertical;min-height:80px;transition:border-color .2s;display:none;}
.plan-edit:focus{border-color:var(--blue);}
.plan-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn-approve{background:var(--green);color:#fff;border:none;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;padding:8px 18px;border-radius:6px;cursor:pointer;transition:all .2s;}
.btn-approve:hover{background:#1a7a35;}
.btn-cancel{background:transparent;border:
