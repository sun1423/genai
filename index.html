<!DOCTYPE html>
<html>
<head>
    <title>Clean Chat</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
        #chatbox { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .user { color: blue; }
        .ai { color: green; margin-bottom: 10px; }
        .meta { font-size: 0.7em; color: #888; }
    </style>
</head>
<body>
    <div id="chatbox"></div>
    <input type="text" id="userInput" placeholder="Type a message..." style="width: 80%">
    <button onclick="sendMessage()">Send</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatbox = document.getElementById('chatbox');
            const message = input.value;
            if (!message) return;

            // Display User Message
            chatbox.innerHTML += `<div class="user"><b>You:</b> ${message}</div>`;
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();

                // 🟢 DATA IS ALREADY CLEAN: Just use data.text
                chatbox.innerHTML += `
                    <div class="ai">
                        <b>AI:</b> ${data.text}
                        <div class="meta">Model: ${data.model} | Tokens: ${data.tokens}</div>
                    </div>`;
                
                chatbox.scrollTop = chatbox.scrollHeight;
            } catch (err) {
                chatbox.innerHTML += `<div style="color:red">Error connecting to server</div>`;
            }
        }
    </script>
</body>
</html>
