<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Proxy Tool</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { text-align: center; color: #333; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        #output { background: #f8f9fa; padding: 15px; margin-top: 20px; border-radius: 4px; border-left: 4px solid #007bff; white-space: pre-wrap; min-height: 40px; }
    </style>
</head>
<body>
    <h3>Secure AI Analysis</h3>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <textarea id="msg" rows="5" placeholder="Enter text to analyze..."></textarea>
    <button onclick="send()">Run Analysis</button>
    <div id="output">Waiting for input...</div>

    <script>
        async function send() {
            const out = document.getElementById('output');
            out.innerText = "Processing...";
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('user').value,
                        password: document.getElementById('pass').value,
                        text: document.getElementById('msg').value
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "Request failed");
                out.innerText = data.choices[0].message.content;
            } catch (err) {
                out.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html><!DOCTYPE html>
<html>
<body>
    <h2>VM AI Processor</h2>
    <textarea id="input" style="width:100%; height:100px;"></textarea><br>
    <button onclick="process()">Analyze</button>
    <pre id="output" style="background:#eee; padding:10px; margin-top:10px;"></pre>

    <script>
        async function process() {
            const out = document.getElementById('output');
            out.innerText = "Processing...";
            const res = await fetch('/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text: document.getElementById('input').value })
            });
            const data = await res.json();
            out.innerText = data.choices[0].message.content;
        }
    </script>
</body>
</html>
