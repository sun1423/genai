<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background: #f9f9fb; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; height: 100vh; display: flex; flex-direction: column; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 80%; line-height: 1.5; font-size: 15px; }
        .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #f1f3f4; color: #202124; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        .input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 12px; }
        input { flex: 1; padding: 14px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 15px; }
        button { padding: 0 24px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask Gemini..." onkeypress="if(event.key==='Enter') send()">
            <button id="btn" onclick="send()">Send</button>
        </div>
    </div>
    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('btn');

        async function send() {
            const msg = input.value.trim();
            if(!msg) return;

            // User Message
            chat.innerHTML += `<div class="msg user">${msg}</div>`;
            input.value = '';
            btn.disabled = true;
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                
                // AI Clean Message
                chat.innerHTML += `<div class="msg ai">${data.text || "Error occurred"}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg ai">Connection Error.</div>`;
            } finally {
                btn.disabled = false;
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
