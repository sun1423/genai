name: Direct File Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Files to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          source: "server.js,index.html,package.json" # List your files here
          target: "~/ai-app"

      - name: Run App on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cd ~/ai-app
            
            # Create the .env file with your key
            echo "OPENROUTER_KEY=${{ secrets.OPENROUTER_KEY }}" > .env
            echo "PORT=3000" >> .env

            # Install and Start
            npm install --production
            pm2 restart ai-server || pm2 start server.js --name "ai-server"
