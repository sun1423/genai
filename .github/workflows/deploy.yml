name: Production Proxy Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Files to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          source: "server.js,index.html,package.json"
          target: "~/ai-app"

      - name: Setup Environment and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cd ~/ai-app
            # Create a clean .env file
            echo "OPENROUTER_KEY=${{ secrets.OPENROUTER_KEY }}" > .env
            echo "PORT=3000" >> .env
            
            # Install dependencies
            npm install --production
            
            # Use 'delete' and 'start' to ensure a clean slate and fresh memory
            pm2 delete ai-server || true
            pm2 start server.js --name "ai-server" --update-env
