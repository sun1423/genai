- name: SSH and Setup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            # 1. Create directory if it doesn't exist
            mkdir -p ~/ai-app
            cd ~/ai-app

            # 2. Initialize git if not already there, otherwise pull latest
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi

            # 3. Create/Update the secret .env file
            echo "OPENROUTER_KEY=${{ secrets.OPENROUTER_KEY }}" > .env
            echo "PORT=3000" >> .env

            # 4. Install dependencies (now it will find package.json)
            npm install

            # 5. Start or Restart with PM2
            # Use --update-env to ensure the new OPENROUTER_KEY is loaded
            pm2 restart ai-server --update-env || pm2 start server.js --name "ai-server"
