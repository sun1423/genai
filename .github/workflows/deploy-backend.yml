name: Deploy Backend to VM

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/autodeploy-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/autodeploy-backend:${{ github.sha }}

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/autodeploy-backend:latest
            docker stop autodeploy-backend 2>/dev/null || true
            docker rm   autodeploy-backend 2>/dev/null || true
            docker run -d \
              --name autodeploy-backend \
              --restart unless-stopped \
              -p ${{ secrets.BACKEND_PORT }}:9000 \
              -e GROQ_KEY="${{ secrets.GROQ_KEY }}" \
              -e OPENROUTER_KEY="${{ secrets.OPENROUTER_KEY }}" \
              -e VM_IP="${{ secrets.VM_IP }}" \
              -e VM_USERNAME="${{ secrets.VM_USERNAME }}" \
              -e VM_PASSWORD="${{ secrets.VM_PASSWORD }}" \
              -e DH_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}" \
              -e DH_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}" \
              -e UI_USERNAME="${{ secrets.UI_USERNAME }}" \
              -e UI_PASSWORD="${{ secrets.UI_PASSWORD }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/autodeploy-backend:latest
            echo "✅ Backend running at http://${{ secrets.VM_IP }}:${{ secrets.BACKEND_PORT }}"
